@let questions = questions$ | async;

@if (questions !== null) {
    <form [formGroup]="form" (ngSubmit)="onSubmit.next()" class="lh-dialog-card">
        <h2 class="lh-dialog-title">Запрос на верификацию</h2>

        <div class="lh-dialog-info">
            <p class="text-lh-danger font-medium">Используйте ваш настоящий игровой ник в Vintage Story*</p>
        </div>

        <div class="flex flex-col gap-2">
            <label class="flex flex-col gap-1">
                <span class="text-[#2a2722] text-base font-medium">Игровой ник</span>
                <lh-input formControlName="gameName" placeholder="Игровой ник" />
                <tui-error formControlName="gameName" [error]="[] | tuiFieldError | async" />
            </label>
            <label class="flex flex-col gap-1">
                <span class="text-[#2a2722] text-base font-medium">Ваш discord или telegram</span>
                <lh-input formControlName="contacts" placeholder="Ваш discord или telegram" />
                <tui-error formControlName="contacts" [error]="[] | tuiFieldError | async" />
            </label>
        </div>

        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <p class="text-[#2a2722] font-medium">{{ questions[0].question }}</p>
                <lh-input type="textarea" placeholder="Ответ на вопрос" [formControl]="form.controls.answer1" [rows]="2" />
                <tui-error formControlName="answer1" [error]="[] | tuiFieldError | async" />
            </div>
            <div class="flex flex-col gap-1">
                <p class="text-[#2a2722] font-medium">{{ questions[1].question }}</p>
                <lh-input type="textarea" placeholder="Ответ на вопрос" [formControl]="form.controls.answer2" [rows]="2" />
                <tui-error formControlName="answer2" [error]="[] | tuiFieldError | async" />
            </div>
            <div class="flex flex-col gap-1">
                <p class="text-[#2a2722] font-medium">{{ questions[2].question }}</p>
                <lh-input type="textarea" placeholder="Ответ на вопрос" [formControl]="form.controls.answer3" [rows]="2" />
                <tui-error formControlName="answer3" [error]="[] | tuiFieldError | async" />
            </div>
            <div class="flex flex-col gap-1">
                <p class="text-[#2a2722] font-medium">{{ questions[3].question }}</p>
                <lh-input type="textarea" placeholder="Ответ на вопрос" [formControl]="form.controls.answer4" [rows]="2" />
                <tui-error formControlName="answer4" [error]="[] | tuiFieldError | async" />
            </div>
            <div class="flex flex-col gap-1">
                <p class="text-[#2a2722] font-medium">{{ questions[4].question }}</p>
                <lh-input type="textarea" placeholder="Ответ на вопрос" [formControl]="form.controls.answer5" [rows]="2" />
                <tui-error formControlName="answer5" [error]="[] | tuiFieldError | async" />
            </div>
        </div>

        <div class="lh-dialog-actions">
            <button
                type="button"
                (click)="context.$implicit.complete()"
                class="lh-dialog-button lh-dialog-button-secondary"
            >
                Отмена
            </button>
            <button type="submit" [disabled]="!form.valid" class="lh-dialog-button lh-dialog-button-primary">
                Отправить запрос
            </button>
        </div>
    </form>
}
