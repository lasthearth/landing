<div class="text-lh-primary flex flex-col gap-6 p-6 relative">
    <!-- Маркер для определения прокрутки -->
    <div id="rules-scroll-sentinel" class="absolute top-0 left-0 w-px h-px pointer-events-none"></div>

    <div class="flex justify-between items-center">
        <p class="text-2xl md:text-3xl lg:text-4xl font-bold text-[#2d201a]">{{ "rules.title" | translate }}</p>
        <button
            (click)="toggleAll()"
            class="shrink-0 rounded-xl px-5 py-2.5 text-[18px] font-bold text-[#2a2722] cursor-pointer transition-all duration-200 bg-[#d8cdb3] border border-[#c4b89e] hover:bg-[#c4b89e]"
        >
            {{
                globalExpandService.globalExpandState()
                    ? ("rules.collapseAll" | translate)
                    : ("rules.expandAll" | translate)
            }}
        </button>
    </div>

    <!-- Терминология -->
    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section
            sectionId="terminology"
            title="rules.sections.terminology"
            icon="@tui.scroll-text"
            (scrollTo)="scrollToElement($event)"
        >
            <app-terminology (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section sectionId="base" title="rules.sections.base" (scrollTo)="scrollToElement($event)">
            <app-base (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    <!-- 2. О селениях -->
    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section
            sectionId="settlements"
            title="rules.sections.settlements"
            (scrollTo)="scrollToElement($event)"
        >
            <app-about-settlements (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    <!-- 3. Действия игроков -->
    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section sectionId="actions" title="rules.sections.actions" (scrollTo)="scrollToElement($event)">
            <app-players-actions (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    <!-- 4. Колонизация -->
    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section
            sectionId="colonization"
            title="rules.sections.colonization"
            (scrollTo)="scrollToElement($event)"
        >
            <app-colonization (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    <!-- 5. Военные действия -->
    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section sectionId="military" title="rules.sections.military" (scrollTo)="scrollToElement($event)">
            <app-military-actions (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    <!-- 6. Права и обязанности администрации -->
    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
        <app-rule-section sectionId="admin" title="rules.sections.admin" (scrollTo)="scrollToElement($event)">
            <app-admin-rights (scrollTo)="scrollToElement($event)" />
        </app-rule-section>
    </div>

    @if (showScrollTop) {
        <button
            (click)="scrollToTop()"
            class="fixed bottom-6 right-6 z-[100] w-12 h-12 rounded-full bg-[#d8cdb3] border border-[#c4b89e] text-[#2a2722] flex items-center justify-center cursor-pointer transition-all duration-300 hover:bg-[#c4b89e] shadow-[0_2px_8px_rgba(0,0,0,0.1)]"
            [title]="'rules.scrollTop' | translate"
        >
            <tui-icon icon="@tui.chevron-up" class="size-6!" />
        </button>
    }
</div>
