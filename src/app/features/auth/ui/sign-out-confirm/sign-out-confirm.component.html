<div class="lh-dialog-card">
    <h2 class="lh-dialog-title text-center">{{ 'auth.signOutConfirm.title' | translate }}</h2>

    <div class="lh-dialog-actions">
        <button type="button" (click)="context.$implicit.complete()" class="lh-dialog-button lh-dialog-button-secondary">
            {{ 'auth.signOutConfirm.stay' | translate }}
        </button>
        <button type="button" (click)="signOut()" class="lh-dialog-button lh-dialog-button-danger">
            {{ 'auth.signOutConfirm.signOut' | translate }}
        </button>
    </div>
</div>
