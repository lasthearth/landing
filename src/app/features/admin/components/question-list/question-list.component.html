<div class="flex flex-col gap-6">
    @if (questions().length > 0) {
        <div class="flex flex-col gap-6">
            @for (q of questions(); track q.id) {
                <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 shadow-[0_2px_8px_rgba(0,0,0,0.06)] flex items-center justify-between gap-4">
                    <div class="flex flex-col gap-2 flex-1 min-w-0">
                        <p class="text-[23px] leading-[32px] text-[#2d201a]">{{ q.text }}</p>
                        @if (q.createdBy) {
                            <span class="text-[18px] text-[#5c554a]">{{ 'admin.questions.createdBy' | translate }} {{ userNames()[q.createdBy] }}</span>
                        }
                    </div>
                    <button
                        type="button"
                        [disabled]="deletingId() === q.id"
                        class="shrink-0 rounded-xl px-5 py-2.5 text-[18px] font-bold text-[#2a2722] cursor-pointer transition-all duration-200 bg-[#d8cdb3] border border-[#c4b89e] hover:bg-[#c4b89e] disabled:opacity-50 disabled:cursor-not-allowed"
                        (click)="remove(q.id)"
                    >
                        {{ 'admin.questions.delete' | translate }}
                    </button>
                </div>
            }
        </div>
    } @else {
        <p class="text-2xl/7.5 my-6 uppercase font-bold text-[#bdb093] self-center">{{ 'admin.questions.noQuestions' | translate }}</p>
    }
</div>
