<div class="bg-[#e2d7bb] rounded-2xl p-10 min-w-[340px] flex flex-col gap-8 shadow-[0_4px_12px_rgba(0,0,0,0.12)]">
    <div class="flex items-center gap-4">
        <div
            class="flex items-center justify-center size-12 rounded-full bg-lh-accent/10 border border-lh-accent/20 shrink-0"
        >
            <tui-icon icon="@tui.check" class="size-6! text-lh-accent" />
        </div>
        <p class="text-2xl font-bold text-[#2d201a]">Подтвердить одобрение?</p>
    </div>
    <div class="flex gap-4">
        <button
            (click)="context.$implicit.complete()"
            class="flex-1 text-lg font-bold cursor-pointer bg-transparent border-2 border-neutral-500 text-neutral-600 rounded-xl py-3 hover:bg-neutral-500/10 transition-colors"
        >
            Отмена
        </button>
        <button
            (click)="confirmApprove()"
            class="flex-1 text-lg font-bold cursor-pointer bg-lh-accent text-white rounded-xl py-3 hover:bg-[#e66a1a] transition-colors"
        >
            Одобрить
        </button>
    </div>
</div>
