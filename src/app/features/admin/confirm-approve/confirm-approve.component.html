<div class="lh-dialog-card">
    <div class="flex items-center gap-4">
        <div
            class="flex items-center justify-center size-12 rounded-full bg-lh-accent/10 border border-lh-accent/20 shrink-0"
        >
            <tui-icon icon="@tui.check" class="size-6! text-lh-accent" />
        </div>
        <p class="lh-dialog-title">Подтвердить одобрение?</p>
    </div>

    <div class="lh-dialog-actions">
        <button type="button" (click)="context.$implicit.complete()" class="lh-dialog-button lh-dialog-button-secondary">
            Отмена
        </button>
        <button type="button" (click)="confirmApprove()" class="lh-dialog-button lh-dialog-button-primary">
            Одобрить
        </button>
    </div>
</div>
