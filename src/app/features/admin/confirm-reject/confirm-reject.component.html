<form [formGroup]="form" (ngSubmit)="onSubmit.next()" class="lh-dialog-card">
    <div class="flex items-center gap-4">
        <div
            class="flex items-center justify-center size-12 rounded-full bg-lh-accent/10 border border-lh-accent/20 shrink-0"
        >
            <tui-icon icon="@tui.x" class="size-6! text-lh-accent" />
        </div>
        <p class="lh-dialog-title">Причина отклонения</p>
    </div>

    <div class="flex flex-col gap-3">
        <span class="text-base text-[#8a7a6a] font-medium">Быстрый выбор:</span>
        <div class="flex flex-wrap gap-2">
            @for (reason of quickReasons; track $index) {
                <button
                    type="button"
                    (click)="selectReason(reason)"
                    class="text-base cursor-pointer bg-lh-primary-2/10 border border-lh-primary-2/20 text-[#5c4030] rounded-lg py-1.5 px-3 hover:bg-lh-accent/10 hover:border-lh-accent/30 hover:text-lh-accent transition-all"
                >
                    {{ reason }}
                </button>
            }
        </div>
    </div>

    <lh-input
        type="textarea"
        placeholder="Опишите причину отклонения..."
        [formControl]="form.controls.reason"
    />
    <tui-error formControlName="reason" [error]="[] | tuiFieldError | async" />

    <div class="lh-dialog-actions">
        <button type="button" (click)="context.$implicit.complete()" class="lh-dialog-button lh-dialog-button-secondary">
            Отмена
        </button>
        <button type="submit" [disabled]="!form.valid" class="lh-dialog-button lh-dialog-button-danger">
            Отклонить
        </button>
    </div>
</form>
