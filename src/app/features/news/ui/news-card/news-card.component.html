<div class="news-card group">
    <div
        class="news-card__bg"
        [style.backgroundImage]="
            preview() ? 'url(' + preview() + ')' : 'url(/images/screenshots/screen_1.webp)'
        "
    ></div>
    <div class="news-card__overlay"></div>
    <div class="news-card__accent-border" aria-hidden="true"></div>

    @if (canDelete()) {
        <button
            type="button"
            (click)="onDeleteClick($event)"
            class="absolute top-4 right-4 z-30 size-9 flex items-center justify-center rounded-lg bg-lh-primary-2/60 hover:bg-lh-danger/80 backdrop-blur-md transition-all duration-200 cursor-pointer"
            title="Удалить новость"
        >
            <tui-icon icon="@tui.trash-2" class="text-neutral-200 size-4" />
        </button>
    }

    <div class="news-card__content flex sm:flex-col justify-between gap-4 items-end sm:items-start sm:gap-0">
        <div class="p-6 md:p-8 flex gap-8 lg:gap-12 items-center justify-between w-full">
            <div
                class="shrink-0 relative hidden md:block xl:hidden 2xl:block size-64 lg:size-72 shadow-2xl shadow-black/60 overflow-clip rounded-xl border-2 border-[rgba(232,216,184,0.12)]"
            >
                <img
                    [src]="preview()"
                    alt="Превью новости: {{ title() }}"
                    class="hidden md:block xl:hidden 2xl:block size-64 lg:size-72 object-cover rounded-xl"
                />
            </div>
            <div class="flex flex-col gap-5 w-full items-start">
                <div class="flex flex-col gap-3 items-start">
                    <h2 class="text-2xl/7.5 md:text-4xl uppercase font-bold text-shadow-md text-neutral-100 group-hover:text-[#ffcc8a] transition-colors duration-300">
                        {{ title() }}
                    </h2>
                    <div class="flex flex-wrap gap-2 items-center">
                        @if (date() !== '—') {
                            <span
                                class="inline-flex items-center gap-1.5 h-7 px-3 rounded-md text-sm font-bold text-[#f0e6d2] bg-gradient-to-br from-[#8b4a1f] to-[#c35a17] shadow-[inset_0_1px_0_rgba(255,255,255,0.12)]"
                            >
                                {{ date() }}
                            </span>
                        }
                        @if (createdBy()) {
                            <span
                                class="inline-flex items-center gap-1.5 h-7 px-3 rounded-md text-sm font-bold text-[#f0e6d2] bg-gradient-to-br from-[#8b4a1f]/75 to-[#c35a17]/75"
                            >
                                {{ createdBy() }}
                            </span>
                        }
                        <span
                            class="inline-flex items-center gap-1.5 h-7 px-3 rounded-md text-sm font-bold text-[#f0e6d2] bg-gradient-to-br from-[#8b4a1f]/75 to-[#c35a17]/75"
                        >
                            <tui-icon icon="@tui.eye" class="size-3.5" />
                            {{ viewCount() }}
                        </span>
                    </div>
                </div>
                <p
                    class="text-base md:text-xl font-medium text-shadow-md text-neutral-200 leading-relaxed"
                    [innerHTML]="content()"
                ></p>
            </div>
        </div>
    </div>
</div>
