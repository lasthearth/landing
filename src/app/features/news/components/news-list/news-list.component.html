@if (news().length > 0) {
    <div class="flex flex-wrap items-center gap-7 pt-0 p-10 pb-4">
        @for (item of pageNews(); track item.id) {
            <app-news-card
                [title]="item.title"
                [content]="item.content"
                [preview]="item.preview"
                [date]="item.formattedDate"
                [viewCount]="item.viewCount"
                [createdBy]="item.createdBy"
                [canDelete]="isAdmin()"
                (delete)="deleteNews(item.id)"
                (open)="openNews(item.id)"
                class="!h-auto w-full"
            />
        }
    </div>

    <tui-pagination
        [index]="pageIndex()"
        [length]="totalPages()"
        (indexChange)="goToPage($event)"
        class="mb-4"
    />
} @else {
    <p
        class="text-2xl/7.5 my-6 uppercase font-bold text-[#bdb093] self-center"
    >
        Новостей пока нет...
    </p>
}
