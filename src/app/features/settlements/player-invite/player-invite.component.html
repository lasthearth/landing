@let players = players$ | async;

<div class="lh-dialog-card">
    <h2 class="lh-dialog-title">{{ 'settlements.invite.title' | translate }}</h2>

    <div class="bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-6 flex flex-col gap-4">
        <div class="flex flex-col gap-2">
            <p class="text-xl text-[#2d201a] font-semibold">{{ 'settlements.invite.nicknameLabel' | translate }}</p>
            <lh-input [placeholder]="'settlements.invite.nicknamePlaceholder' | translate" [formControl]="playerNickControl" />
        </div>

        <div class="flex flex-col">
            @if (!players) {
                <app-empty-state
                    icon="@tui.search"
                    [title]="'settlements.invite.searchEmpty.title' | translate"
                    [description]="'settlements.invite.searchEmpty.description' | translate"
                />
            } @else if (players.users.length === 0) {
                <app-empty-state
                    icon="@tui.user-x"
                    [title]="'settlements.invite.notFound.title' | translate"
                    [description]="'settlements.invite.notFound.description' | translate"
                />
            }
            @for (item of players?.users; track $index) {
                <div class="w-full justify-between flex items-center py-3 border-b border-lh-primary-2/10 last:border-b-0">
                    <div class="flex gap-3 items-center w-full">
                        <app-image-loader
                            [src]="resolveAvatarUrl(item?.avatar)"
                            [alt]="'settlements.invite.avatarAlt' | translate"
                            objectFit="cover"
                            containerClass="rounded-full"
                            class="w-10 h-10"
                        />
                        <span class="text-lg text-[#2d201a] font-semibold">{{ item.user_game_name }}</span>
                    </div>
                    <button
                        (click)="playerInvite(item.user_id)"
                        class="lh-secondary-button text-base py-1.5 px-3 shrink-0"
                    >
                        {{ 'settlements.invite.invite' | translate }}
                    </button>
                </div>
            }
        </div>
    </div>

    <div class="lh-dialog-actions">
        <button type="button" (click)="context.$implicit.complete()" class="lh-dialog-button lh-dialog-button-secondary">
            {{ 'settlements.invite.close' | translate }}
        </button>
    </div>
</div>
