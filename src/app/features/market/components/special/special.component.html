@if (loading()) {
    <app-market-grid-skeleton />
} @else if (items().length === 0) {
    <div class="flex justify-center py-12">
        <p class="text-2xl uppercase font-bold text-[#bdb093] self-center">СКОРО ПОЯВИТСЯ....</p>
    </div>
} @else {
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 lg:gap-4">
        @for (item of items(); track item.id) {
            <div
                class="flex flex-col gap-2 lg:gap-3 bg-lh-primary-2/10 border border-lh-primary-2/10 rounded-2xl p-3 lg:p-4 items-center transition-all duration-300 hover:scale-[103%] hover:border-[#ff7920]/40 hover:shadow-[0_8px_24px_rgba(255,121,32,0.12)] shadow-[0_2px_8px_rgba(0,0,0,0.06)] group"
            >
                <!-- Image -->
                <div
                    class="w-full aspect-square rounded-xl overflow-hidden bg-lh-primary-2/5 border border-lh-primary-2/10 group-hover:border-[#ff7920]/30 transition-colors"
                >
                    @if (item.imageUrl) {
                        <app-image-loader [src]="item.imageUrl" [alt]="item.name" />
                    } @else {
                        <div class="w-full h-full flex items-center justify-center text-[#bdb093]">
                            <tui-icon icon="@tui.image" class="size-12!" />
                        </div>
                    }
                </div>

                <!-- Name -->
                <p class="text-center text-base lg:text-lg font-bold text-lh-primary line-clamp-2 min-h-[3rem] lg:min-h-[3.5rem]">
                    {{ item.name }}
                </p>

                <!-- Price -->
                <div class="flex items-center gap-1.5">
                    <img src="/splinter-of-spark.png" alt="Осколок Искры" class="h-6 w-6 object-contain" />
                    <span class="text-lg lg:text-xl font-bold text-lh-primary">{{ getDisplayPrice(item) }}</span>
                </div>

                <!-- Buy button -->
                <button
                    (click)="openPurchaseDialog(item)"
                    class="w-full text-white uppercase transition-all duration-300 font-bold cursor-pointer bg-gradient-to-r from-lh-accent to-[#e56a18] hover:from-[#e56a18] hover:to-lh-accent rounded-xl py-2 lg:py-2.5 text-sm lg:text-base shadow-[0_2px_8px_rgba(255,121,32,0.25)] hover:shadow-[0_4px_16px_rgba(255,121,32,0.35)]"
                >
                    КУПИТЬ
                </button>
            </div>
        }
    </div>
}
