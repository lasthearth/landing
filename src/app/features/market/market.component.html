<div class="p-6 flex flex-col gap-8">
    <p class="text-4xl font-bold text-lh-primary">Магазин привилегий</p>

    <!-- Вкладки -->
    <div class="flex gap-3">
        <button
            type="button"
            (click)="activeItemIndex.set(0)"
            class="flex-1 py-3.5 rounded-xl border-2 text-xl font-bold uppercase transition-all duration-200"
            [class.border-[#c35a17]]="activeItemIndex() === 0"
            [class.bg-gradient-to-r]="activeItemIndex() === 0"
            [class.from-[#c35a17]]="activeItemIndex() === 0"
            [class.to-[#e07830]]="activeItemIndex() === 0"
            [class.text-white]="activeItemIndex() === 0"
            [class.border-[#c4b89e]]="activeItemIndex() !== 0"
            [class.bg-[#d8cdb3]]="activeItemIndex() !== 0"
            [class.text-[#2a2722]]="activeItemIndex() !== 0"
            [class.hover:bg-[#c4b89e]]="activeItemIndex() !== 0"
        >
            Титулы
        </button>
        <button
            type="button"
            (click)="activeItemIndex.set(1)"
            class="flex-1 py-3.5 rounded-xl border-2 text-xl font-bold uppercase transition-all duration-200"
            [class.border-[#c35a17]]="activeItemIndex() === 1"
            [class.bg-gradient-to-r]="activeItemIndex() === 1"
            [class.from-[#c35a17]]="activeItemIndex() === 1"
            [class.to-[#e07830]]="activeItemIndex() === 1"
            [class.text-white]="activeItemIndex() === 1"
            [class.border-[#c4b89e]]="activeItemIndex() !== 1"
            [class.bg-[#d8cdb3]]="activeItemIndex() !== 1"
            [class.text-[#2a2722]]="activeItemIndex() !== 1"
            [class.hover:bg-[#c4b89e]]="activeItemIndex() !== 1"
        >
            Наборы
        </button>
        <button
            type="button"
            (click)="activeItemIndex.set(2)"
            class="flex-1 py-3.5 rounded-xl border-2 text-xl font-bold uppercase transition-all duration-200"
            [class.border-[#c35a17]]="activeItemIndex() === 2"
            [class.bg-gradient-to-r]="activeItemIndex() === 2"
            [class.from-[#c35a17]]="activeItemIndex() === 2"
            [class.to-[#e07830]]="activeItemIndex() === 2"
            [class.text-white]="activeItemIndex() === 2"
            [class.border-[#c4b89e]]="activeItemIndex() !== 2"
            [class.bg-[#d8cdb3]]="activeItemIndex() !== 2"
            [class.text-[#2a2722]]="activeItemIndex() !== 2"
            [class.hover:bg-[#c4b89e]]="activeItemIndex() !== 2"
        >
            Особое
        </button>
    </div>

    @switch (activeItemIndex()) {
        @case (0) {
            <app-titles />
        }
        @case (1) {
            <app-kits />
        }
        @case (2) {
            <app-special />
        }
    }
</div>
