<div class="lh-dialog-card">
    <h2 class="lh-dialog-title text-center">{{ context.data.title }}</h2>

    <p class="lh-dialog-text text-center">{{ context.data.text }}</p>

    <div class="lh-dialog-actions">
        <button type="button" (click)="cancel()" class="lh-dialog-button lh-dialog-button-secondary">Отмена</button>
        <button type="button" (click)="confirm()" class="lh-dialog-button lh-dialog-button-primary">Подтвердить</button>
    </div>
</div>
