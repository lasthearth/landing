<div class="flex flex-col items-center justify-center gap-4 py-14 px-4 text-center">

        class="flex items-center justify-center size-20 rounded-2xl bg-lh-primary-2/10 border border-lh-primary-2/20 text-lh-primary/50"
    >
        <tui-icon [icon]="icon()" class="size-10!" />

    <p class="text-2xl md:text-3xl font-bold text-lh-primary uppercase tracking-wide">{{ title() }}</p>
