<div
    (click)="toggleDropdown()"
    [class.select-mode]="type() === 'select'"
    [class.has-icon]="icon() && type() !== 'select'"
    class="flexible-input"
>
    @if (type() === "input" || type() === "inputNumber") {
        <input
            type="text"
            [placeholder]="placeholder()"
            [value]="displayedValue"
            [disabled]="disabled"
            [attr.inputmode]="type() === 'inputNumber' ? 'numeric' : null"
            (input)="onInputChange($event)"
        />
    }

    @if (type() === "textarea") {
        <textarea
            [placeholder]="placeholder()"
            [value]="displayedValue"
            [disabled]="disabled"
            [rows]="rows()"
            (input)="onInputChange($event)"
        ></textarea>
    }

    @if (type() === "select") {
        <div class="flex justify-between w-full">
            <div [class.text-[#8c8784]]="!displayedValue" class="select-display">
                {{ displayedValue || placeholder() }}
            </div>
            <img
                src="/chevron-down.svg"
                [class.rotate-180]="dropdownOpen()"
                class="transition-all duration-300 opacity-50"
            />
        </div>
    }

    @if (icon() && type() !== "select") {
        <tui-icon [icon]="icon()" class="input-icon" />
    }

    @if (type() === "select") {
        <div [class.dropdown--open]="dropdownOpen()" class="dropdown">
            @for (item of items(); track $index) {
                <div (click)="selectItem(item); $event.stopPropagation()" class="dropdown-option">
                    {{ displayWith(item) }}
                </div>
            }
        </div>
    }
</div>
