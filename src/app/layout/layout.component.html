<app-background-particles></app-background-particles>

@let isAuth = userAuth$ | async;
@let authChecked = isAuthChecked$ | async;

@if (!isAuth && authChecked) {
    <app-welcome
        [class.scroll]="isSetScrollClass"
        (onScroll)="onWelcomeScroll()"
        class="fixed inset-0 size-full welcome z-[200]"
    />
}

<div class="content-wrapper">
    <div class="flex justify-center">
        <header class="w-full xl:w-[60%]">
            <app-header />
        </header>
    </div>

    <main id="main-content">
        <router-outlet />
    </main>
</div>

<div class="flex justify-center">
    <footer class="w-full xl:w-[60%] main-panel rounded-t-xl! rounded-b-none!">
        <app-footer />
    </footer>
</div>
